<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>医保飞检智能检索 MVP</title>
  <style>
    :root { --bg:#f4f6f8; --panel:#fff; --line:#d8dee6; --text:#17202a; --muted:#64748b; --blue:#1d4ed8; --green:#047857; --amber:#b45309; --red:#b91c1c; --soft-blue:#eff6ff; --soft-green:#ecfdf5; --soft-amber:#fffbeb; }
    * { box-sizing: border-box; }
    body { margin:0; font-family:"Microsoft YaHei",Arial,sans-serif; background:var(--bg); color:var(--text); }
    .app { min-height:100vh; display:grid; grid-template-rows:auto 1fr; }
    header { background:#0f172a; color:#fff; padding:14px 20px; display:flex; justify-content:space-between; align-items:center; }
    header h1 { margin:0; font-size:18px; }
    header .status { font-size:13px; color:#cbd5e1; }
    main { padding:18px; display:grid; grid-template-columns:560px minmax(0,1fr); gap:16px; max-width:1760px; width:100%; margin:0 auto; align-items:start; }
    section { background:var(--panel); border:1px solid var(--line); border-radius:8px; overflow:hidden; }
    .section-head { padding:12px 14px; border-bottom:1px solid var(--line); display:flex; align-items:center; justify-content:space-between; gap:12px; }
    .section-head h2 { margin:0; font-size:15px; }
    .body { padding:14px; }
    label { display:block; color:var(--muted); font-size:13px; margin-bottom:6px; }
    textarea,input { width:100%; border:1px solid #cbd5e1; border-radius:6px; padding:10px; font:inherit; background:#fff; }
    textarea { min-height:132px; resize:vertical; line-height:1.55; }
    input { height:38px; }
    .row { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:12px; }
    .actions { display:flex; gap:10px; margin-top:12px; flex-wrap:wrap; }
    button { border:0; border-radius:6px; padding:10px 12px; font-weight:700; cursor:pointer; }
    button.primary { background:var(--blue); color:#fff; }
    button.secondary { background:#e2e8f0; color:#0f172a; }
    button.confirm { background:var(--green); color:#fff; }
    button:disabled { opacity:.55; cursor:not-allowed; }
    .stack,.left-stack { display:grid; gap:12px; }
    .card { border:1px solid var(--line); border-radius:8px; padding:12px; background:#fff; }
    .card.selected { border-color:var(--green); background:var(--soft-green); }
    .title { font-weight:700; font-size:14px; margin-bottom:6px; }
    .meta { color:var(--muted); font-size:12px; line-height:1.55; word-break:break-all; }
    .pill { display:inline-flex; align-items:center; border-radius:999px; padding:3px 8px; font-size:12px; background:var(--soft-blue); color:var(--blue); margin-right:6px; margin-bottom:6px; }
    .pill.warn { background:var(--soft-amber); color:var(--amber); }
    pre { margin:0; white-space:pre-wrap; word-break:break-word; font-size:12px; line-height:1.5; background:#0f172a; color:#e2e8f0; padding:12px; border-radius:8px; overflow:auto; max-height:420px; }
    .grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
    .empty { color:var(--muted); font-size:14px; padding:12px; background:#f8fafc; border-radius:8px; }
    .error { color:var(--red); background:#fef2f2; border:1px solid #fecaca; border-radius:8px; padding:10px; font-size:13px; }
    th,td { border-bottom:1px solid var(--line); padding:8px; text-align:left; vertical-align:top; }
    table { width:100%; border-collapse:collapse; font-size:12px; }
    .graph-card { margin-top:12px; }
    .graph-wrap { overflow:auto; border:1px solid var(--line); border-radius:8px; background:#f8fafc; }
    .graph-svg { display:block; width:100%; min-width:1120px; height:1040px; }
    .graph-link { stroke:#94a3b8; stroke-width:1.6; fill:none; marker-end:url(#arrow); opacity:.9; }
    .graph-link-label { font-size:11px; fill:#64748b; paint-order:stroke; stroke:#f8fafc; stroke-width:5px; }
    .graph-node circle { stroke:#fff; stroke-width:2.5; filter:drop-shadow(0 1px 2px rgba(15,23,42,.18)); }
    .graph-node text { font-size:12px; fill:#17202a; font-weight:700; dominant-baseline:middle; }
    .graph-node .sub { font-size:10px; fill:#64748b; font-weight:400; }
    .graph-lane { font-size:13px; fill:#475569; font-weight:700; }
    .graph-lane-line { stroke:#e2e8f0; stroke-width:1; stroke-dasharray:4 6; }
    .graph-legend { display:flex; flex-wrap:wrap; gap:8px; margin-top:10px; }
    .legend-item { display:inline-flex; align-items:center; gap:6px; font-size:12px; color:var(--muted); }
    .legend-dot { width:10px; height:10px; border-radius:50%; display:inline-block; }
    .chat-panel { min-height:360px; display:grid; grid-template-rows:auto minmax(180px,1fr) auto; }
    .chat-hero { text-align:center; padding:8px 8px 4px; }
    .chat-hero h2 { margin:0; font-size:28px; letter-spacing:0; }
    .chat-hero .meta { margin-top:6px; }
    .chat-suggestions { display:flex; flex-wrap:wrap; justify-content:center; gap:8px; padding:8px 0; }
    .chat-chip { border-radius:999px; padding:8px 12px; background:#f1f5f9; color:#0f172a; font-weight:600; }
    .chat-log { display:grid; gap:10px; align-content:start; padding:8px 0; max-height:360px; overflow:auto; }
    .msg { max-width:86%; padding:10px 12px; border-radius:12px; font-size:13px; line-height:1.55; white-space:pre-wrap; }
    .msg.user { justify-self:end; background:var(--blue); color:#fff; }
    .msg.ai { justify-self:start; background:#f1f5f9; color:var(--text); border:1px solid var(--line); }
    .chat-input { border:1px solid #93c5fd; border-radius:14px; padding:10px; background:#fff; box-shadow:0 8px 24px rgba(29,78,216,.08); }
    .chat-input textarea { min-height:72px; border:0; padding:4px; resize:vertical; }
    .chat-tools { display:flex; align-items:center; gap:8px; margin-top:8px; flex-wrap:wrap; }
    .icon-btn { width:38px; height:38px; border-radius:50%; padding:0; display:inline-flex; align-items:center; justify-content:center; font-size:18px; }
    .voice-on { background:#fee2e2 !important; color:#b91c1c !important; }
    @media (max-width:960px) { main { grid-template-columns:1fr; } .grid { grid-template-columns:1fr; } }
  </style>
</head>
<body>
<div class="app">
  <header><h1>医保飞检智能检索 H5 MVP</h1><div class="status" id="apiStatus">连接中...</div></header>
  <main>
    <div class="left-stack">
      <section>
        <div class="section-head"><h2>新建查询</h2></div>
        <div class="body">
          <label for="question">专家问题</label>
          <textarea id="question">查询急诊监护费和急诊诊查费是否存在重复收费</textarea>
          <div class="row">
            <div><label for="dateStart">开始日期</label><input id="dateStart" value="2025-01-01" /></div>
            <div><label for="dateEnd">结束日期</label><input id="dateEnd" value="2026-01-01" /></div>
          </div>
          <div class="actions">
            <button class="primary" id="previewBtn" onclick="previewQuery()">解析预览</button>
            <button class="secondary" onclick="fillDemo('查询阿帕他胺片是否存在性别限制违规')">性别示例</button>
            <button class="secondary" onclick="fillDemo('查询儿童专用药品的年龄限制')">年龄示例</button>
          </div>
          <div id="message" style="margin-top:12px"></div>
        </div>
      </section>

      <section>
        <div class="section-head"><h2>快速查询</h2></div>
        <div class="body">
          <label for="quickQuery">项目 / 规则 / 政策 / 原始资料</label>
          <input id="quickQuery" value="急诊监护费" />
          <div class="actions">
            <button class="primary" onclick="quickSearch('all')">综合查询</button>
            <button class="secondary" onclick="quickSearch('charge_item_catalog')">收费项目</button>
            <button class="secondary" onclick="quickSearch('rule_item')">规则</button>
          </div>
          <div id="quickResults" style="margin-top:12px"><div class="empty">等待查询。</div></div>
        </div>
      </section>

      <section>
        <div class="section-head"><h2>证据图谱</h2></div>
        <div class="body" id="graphBox"><div class="empty">解析或执行后显示证据图谱。</div></div>
      </section>
    </div>
    <div class="stack">
      <section class="chat-panel">
        <div class="section-head"><h2>智能交流</h2><div class="meta">文字 / 语音咨询</div></div>
        <div class="body">
          <div class="chat-hero">
            <h2>有什么可以帮你核查？</h2>
            <div class="meta">可询问重复收费、性别限制、年龄限制、政策依据和医保编码。</div>
          </div>
          <div class="chat-suggestions">
            <button class="chat-chip" onclick="askSuggestion('查询急诊监护费和急诊诊查费是否存在重复收费')">重复收费核查</button>
            <button class="chat-chip" onclick="askSuggestion('阿帕他胺片是否存在性别限制违规')">性别限制</button>
            <button class="chat-chip" onclick="askSuggestion('儿童用药有哪些年龄限制规则')">年龄限制</button>
          </div>
          <div class="chat-log" id="chatLog"><div class="msg ai">你好，我是医保飞检智能助手。你可以用文字或语音问我规则、政策依据、收费项目和疑点核查问题。</div></div>
          <div class="chat-input">
            <textarea id="chatInput" placeholder="发消息，例如：急诊监护费和急诊诊查费是否重复收费"></textarea>
            <div class="chat-tools">
              <button class="secondary icon-btn" id="voiceBtn" onclick="toggleVoiceInput()" title="语音输入">🎙</button>
              <button class="secondary" onclick="copyChatToQuestion()">填入查询</button>
              <button class="primary" id="chatSendBtn" onclick="sendChatMessage()">发送</button>
              <span class="meta" id="voiceStatus">语音未开启</span>
            </div>
          </div>
        </div>
      </section>
      <section>
        <div class="section-head"><h2>候选规则</h2><button class="confirm" id="confirmBtn" onclick="confirmRule()" disabled>确认并生成 SQL</button></div>
        <div class="body" id="ruleHits"><div class="empty">等待解析。</div></div>
      </section>
      <div class="grid">
        <section><div class="section-head"><h2>政策依据 / RAG</h2></div><div class="body" id="policyHits"><div class="empty">等待解析。</div></div></section>
        <section><div class="section-head"><h2>受控 SQL</h2><div class="actions" style="margin-top:0"><button class="secondary" id="realBtn" onclick="realExecute()" disabled>真实执行</button><button class="confirm" id="mockBtn" onclick="mockExecute()" disabled>模拟执行</button></div></div><div class="body"><pre id="sqlBox">等待专家确认规则后生成。</pre></div></section>
      </div>
      <section><div class="section-head"><h2>模拟结果</h2></div><div class="body" id="resultBox"><div class="empty">等待模拟执行。</div></div></section>
    </div>
  </main>
</div>
<script>
let selectedRule = null;
let lastConfirmPayload = null;
let lastTaskId = null;
let chatHistory = [];
let recognition = null;
let recognizing = false;

function setMessage(text, isError=false){ const el=document.getElementById('message'); el.className=isError?'error':'meta'; el.textContent=text||''; }
function fillDemo(text){ document.getElementById('question').value=text; }
function escapeHtml(value){ return String(value ?? '').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#39;'); }
async function api(path, options={}){ const res=await fetch(path,options); const data=await res.json(); if(!res.ok) throw new Error(data.error||`HTTP ${res.status}`); return data; }

function appendChat(role, text){
  const box=document.getElementById('chatLog');
  const div=document.createElement('div');
  div.className=`msg ${role==='user'?'user':'ai'}`;
  div.textContent=text;
  box.appendChild(div);
  box.scrollTop=box.scrollHeight;
}
function askSuggestion(text){ document.getElementById('chatInput').value=text; sendChatMessage(); }
function copyChatToQuestion(){ const text=document.getElementById('chatInput').value.trim(); if(text) document.getElementById('question').value=text; }
async function sendChatMessage(){
  const input=document.getElementById('chatInput');
  const text=input.value.trim();
  if(!text) return;
  appendChat('user', text);
  chatHistory.push({role:'user', content:text});
  input.value='';
  document.getElementById('chatSendBtn').disabled=true;
  try{
    const data=await api('/api/v1/assistant/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:text,history:chatHistory.slice(-8)})});
    appendChat('ai', data.reply||'已收到。');
    chatHistory.push({role:'assistant', content:data.reply||''});
    document.getElementById('question').value=text;
    if(data.rule_hits) renderRules(data.rule_hits);
    if(data.policy_hits) renderPolicies(data.policy_hits);
    if(data.evidence_graph) renderGraphPanel(data.evidence_graph);
    if(data.quick_results) renderQuickResults({results:data.quick_results});
    setMessage('智能助手已根据知识库返回建议。');
  }catch(err){ appendChat('ai', err.message); setMessage(err.message,true); }
  finally{ document.getElementById('chatSendBtn').disabled=false; }
}
function toggleVoiceInput(){
  const SpeechRecognition=window.SpeechRecognition||window.webkitSpeechRecognition;
  const status=document.getElementById('voiceStatus');
  const btn=document.getElementById('voiceBtn');
  if(!SpeechRecognition){ status.textContent='当前浏览器不支持语音识别'; return; }
  if(recognizing && recognition){ recognition.stop(); return; }
  recognition=new SpeechRecognition();
  recognition.lang='zh-CN';
  recognition.interimResults=true;
  recognition.continuous=false;
  recognizing=true;
  btn.classList.add('voice-on');
  status.textContent='正在听...';
  recognition.onresult=(event)=>{
    let text='';
    for(let i=event.resultIndex;i<event.results.length;i++) text+=event.results[i][0].transcript;
    document.getElementById('chatInput').value=text;
  };
  recognition.onerror=()=>{ status.textContent='语音识别失败，可改用文字输入'; };
  recognition.onend=()=>{ recognizing=false; btn.classList.remove('voice-on'); status.textContent='语音已结束'; };
  recognition.start();
}
function renderRules(rules){
  const box=document.getElementById('ruleHits'); selectedRule=null; document.getElementById('confirmBtn').disabled=true;
  if(!rules||!rules.length){ box.innerHTML='<div class="empty">没有匹配到候选规则。</div>'; return; }
  window.__rules=rules;
  box.innerHTML=rules.map((r,i)=>`<div class="card" id="rule-${i}" onclick="selectRule(${i})"><div class="title">${escapeHtml(r.item_name||r.item_code||r.item_rule_id)}</div><div><span class="pill">${escapeHtml(r.rule_type)}</span><span class="pill warn">score ${r.score}</span></div><div class="meta">${escapeHtml(r.condition_text||'')}</div><div class="meta">编码：${escapeHtml(r.item_code||'')}</div><div class="meta">ID：${escapeHtml(r.item_rule_id||'')}</div></div>`).join('');
  selectRule(0);
}
function renderPolicies(items){
  const box=document.getElementById('policyHits');
  if(!items||!items.length){ box.innerHTML='<div class="empty">暂无政策依据命中。</div>'; return; }
  box.innerHTML=items.map(p=>`<div class="card"><div class="title">${escapeHtml(p.title||p.document_id)}</div><div><span class="pill">score ${p.score}</span></div><div class="meta">${escapeHtml(p.content_preview||'')}</div><div class="meta">来源：${escapeHtml((p.metadata&&p.metadata.source_file)||'')}</div></div>`).join('');
}
function selectRule(index){ selectedRule=window.__rules[index]; document.querySelectorAll('#ruleHits .card').forEach(el=>el.classList.remove('selected')); const el=document.getElementById(`rule-${index}`); if(el) el.classList.add('selected'); document.getElementById('confirmBtn').disabled=!selectedRule; }

async function previewQuery(){
  const btn=document.getElementById('previewBtn'); btn.disabled=true; setMessage('正在解析问题并检索规则/政策...');
  document.getElementById('sqlBox').textContent='等待专家确认规则后生成。'; document.getElementById('resultBox').innerHTML='<div class="empty">等待模拟执行。</div>'; document.getElementById('graphBox').innerHTML='<div class="empty">解析或执行后显示证据图谱。</div>'; document.getElementById('mockBtn').disabled=true; document.getElementById('realBtn').disabled=true; lastConfirmPayload=null; lastTaskId=null;
  try{ const question=document.getElementById('question').value.trim(); const data=await api('/api/v1/query/preview',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({question})}); renderRules(data.rule_hits); renderPolicies(data.policy_hits); renderGraphPanel(data.evidence_graph); setMessage(`候选规则类型：${(data.understanding.candidate_rule_types||[]).join(', ')||'未明确'}`); }
  catch(err){ setMessage(err.message,true); } finally{ btn.disabled=false; }
}

async function confirmRule(){
  if(!selectedRule) return; const btn=document.getElementById('confirmBtn'); btn.disabled=true; setMessage('正在生成受控 SQL...');
  try{ lastConfirmPayload={ item_rule_id:selectedRule.item_rule_id, date_start:document.getElementById('dateStart').value.trim(), date_end:document.getElementById('dateEnd').value.trim() };
    const data=await api('/api/v1/query/confirm',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(lastConfirmPayload)});
    document.getElementById('sqlBox').textContent=JSON.stringify(data,null,2); renderGraphPanel(data.evidence_graph); const canExecute=!!(data.sql_validation&&data.sql_validation.valid); document.getElementById('mockBtn').disabled=!canExecute; document.getElementById('realBtn').disabled=!canExecute; setMessage('已生成受控 SQL。当前仅生成，不执行。'); }
  catch(err){ setMessage(err.message,true); } finally{ btn.disabled=false; }
}

function graphColor(type){
  return ({
    RuleItem:'#2563eb',
    RuleDefinition:'#7c3aed',
    ChargeItem:'#059669',
    ChargeCode:'#0f766e',
    SourceAsset:'#d97706',
    PolicyDocument:'#dc2626',
    PolicyClause:'#b91c1c',
    QueryTask:'#475569',
    Finding:'#e11d48'
  })[type] || '#64748b';
}
function graphTypeLabel(type){
  return ({
    RuleItem:'规则',
    RuleDefinition:'规则类型',
    ChargeItem:'收费项目',
    ChargeCode:'医保编码',
    SourceAsset:'来源资料',
    PolicyDocument:'政策文件',
    PolicyClause:'政策条款',
    QueryTask:'执行任务',
    Finding:'疑点'
  })[type] || type;
}
function graphRelationLabel(relation){
  return ({
    belongs_to:'属于',
    applies_to:'关联项目',
    has_code:'编码',
    derived_from:'来源',
    part_of:'属于文件',
    mentions:'提及',
    has_finding:'发现疑点',
    triggered_by:'命中规则'
  })[relation] || relation;
}
function shorten(value, max=14){
  const text=String(value ?? '');
  return text.length>max ? `${text.slice(0,max-1)}…` : text;
}
function layoutGraph(nodes){
  const columns=[
    { label:'来源依据', types:['SourceAsset','PolicyDocument','PolicyClause'] },
    { label:'规则', types:['RuleDefinition','RuleItem'] },
    { label:'收费项目', types:['ChargeItem'] },
    { label:'医保编码', types:['ChargeCode'] },
    { label:'任务疑点', types:['QueryTask','Finding'] }
  ];
  const positions={};
  const width=1240, height=1040, gapX=245, startX=72;
  columns.forEach((col,idx)=>{
    const groupNodes=nodes.filter(n=>col.types.includes(n.type));
    const step=groupNodes.length>1 ? Math.min(250,(height-300)/(groupNodes.length-1)) : 0;
    const start=groupNodes.length>1 ? (height-step*(groupNodes.length-1))/2+54 : height/2+26;
    groupNodes.forEach((n,i)=>{ positions[n.id]={ x:startX+idx*gapX, y:start+i*step }; });
  });
  nodes.forEach((n,i)=>{ if(!positions[n.id]) positions[n.id]={ x:startX+(i%5)*gapX, y:150+Math.floor(i/5)*210 }; });
  const lanes=columns.map((col,idx)=>({ label:col.label, x:startX+idx*gapX }));
  return {positions,width,height,lanes};
}
function renderEvidenceGraph(graph){
  if(!graph) return '<div class="empty">暂无依据链。</div>';
  const nodes=graph.nodes||[], edges=graph.edges||[];
  if(!nodes.length) return '<div class="empty">暂无可视化节点。</div>';
  const {positions,width,height,lanes}=layoutGraph(nodes);
  const laneSvg=lanes.map(l=>`<line class="graph-lane-line" x1="${l.x}" y1="74" x2="${l.x}" y2="980"></line><text class="graph-lane" x="${l.x}" y="34" text-anchor="middle">${escapeHtml(l.label)}</text>`).join('');
  const relationSeen={};
  const edgeSvg=edges.map((e,i)=>{
    const s=positions[e.source], t=positions[e.target];
    if(!s||!t) return '';
    relationSeen[e.relation]=(relationSeen[e.relation]||0)+1;
    const sameColumn=Math.abs(t.x-s.x)<8;
    const relLabel=graphRelationLabel(e.relation);
    let path, labelX, labelY, anchor='middle';
    if(sameColumn){
      const side=-76-(relationSeen[e.relation]%2)*28;
      path=`M ${s.x} ${s.y} C ${s.x+side} ${s.y+40}, ${t.x+side} ${t.y-40}, ${t.x} ${t.y}`;
      labelX=s.x+side-10;
      labelY=(s.y+t.y)/2;
      anchor='end';
    }else{
      const midX=(s.x+t.x)/2, midY=(s.y+t.y)/2-14+(i%3)*14;
      const dx=t.x-s.x, curve=Math.max(-70, Math.min(70, dx/4));
      path=`M ${s.x} ${s.y} C ${s.x+curve} ${s.y}, ${t.x-curve} ${t.y}, ${t.x} ${t.y}`;
      labelX=midX;
      labelY=midY;
    }
    const repeatedFinding=e.relation==='has_finding' && relationSeen[e.relation]>3;
    const labelSvg=repeatedFinding ? '' : `<text class="graph-link-label" x="${labelX}" y="${labelY}" text-anchor="${anchor}">${escapeHtml(relLabel)}</text>`;
    return `<path class="graph-link" d="${path}"></path>${labelSvg}`;
  }).join('');
  const nodeSvg=nodes.map(n=>{
    const p=positions[n.id], color=graphColor(n.type);
    const label=shorten(n.label||n.id, n.type==='SourceAsset'?18:16);
    return `<g class="graph-node"><circle cx="${p.x}" cy="${p.y}" r="24" fill="${color}"></circle><text x="${p.x+34}" y="${p.y-7}" text-anchor="start">${escapeHtml(label)}</text><text class="sub" x="${p.x+34}" y="${p.y+12}" text-anchor="start">${escapeHtml(graphTypeLabel(n.type))}</text><title>${escapeHtml(graphTypeLabel(n.type))}：${escapeHtml(n.label||n.id)}</title></g>`;
  }).join('');
  const legendTypes=[...new Set(nodes.map(n=>n.type))];
  const legend=legendTypes.map(t=>`<span class="legend-item"><span class="legend-dot" style="background:${graphColor(t)}"></span>${escapeHtml(graphTypeLabel(t))}</span>`).join('');
  const relationText=[...new Set(edges.map(e=>graphRelationLabel(e.relation)))].join('、') || '暂无';
  return `<div class="card graph-card"><div class="title">可视化关系图</div><div class="meta">${escapeHtml(graph.summary||'')}</div><div class="graph-wrap"><svg class="graph-svg" viewBox="0 0 ${width} ${height}" role="img" aria-label="医保规则证据图谱"><defs><marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M 0 0 L 10 4 L 0 8 z" fill="#94a3b8"></path></marker></defs>${laneSvg}${edgeSvg}${nodeSvg}</svg></div><div class="graph-legend">${legend}</div><div class="meta">关系：${escapeHtml(relationText)}</div></div>`;
}
function renderQuickResults(data){
  const box=document.getElementById('quickResults');
  const items=data.results||[];
  if(!items.length){ box.innerHTML='<div class="empty">没有匹配结果。</div>'; return; }
  box.innerHTML=items.map(r=>`<div class="card"><div class="title">${escapeHtml(r.title||r.id)}</div><div><span class="pill">${escapeHtml(r.library)}</span><span class="pill warn">score ${r.score}</span></div><div class="meta">${escapeHtml(r.summary||'')}</div><div class="meta">${escapeHtml(JSON.stringify(r.metadata||{}))}</div></div>`).join('');
}
async function quickSearch(library){
  const query=document.getElementById('quickQuery').value.trim();
  if(!query) return;
  setMessage('正在查询四类库...');
  try{ const data=await api(`/api/v1/quick-search?query=${encodeURIComponent(query)}&library=${encodeURIComponent(library)}&limit=8`); renderQuickResults(data); setMessage('快速查询完成。'); }
  catch(err){ setMessage(err.message,true); }
}
function renderGraphPanel(graph){ document.getElementById('graphBox').innerHTML=renderEvidenceGraph(graph); }
function renderResult(data){
  const s=data.summary||{}, details=data.details||[];
  lastTaskId=data.task_id||lastTaskId;
  const orgs=((data.charts||{}).institution_ranking||[]).map(x=>`<div class="meta">${escapeHtml(x.name)}：${x.value}</div>`).join('');
  const months=((data.charts||{}).monthly_trend||[]).slice(0,12).map(x=>`<div class="meta">${escapeHtml(x.month)}：${x.amount}</div>`).join('');
  const rows=details.slice(0,10).map(r=>`<tr><td>${r.row_no}</td><td>${escapeHtml(r.institution_name)}</td><td>${escapeHtml(r.patient_id_masked)}</td><td>${escapeHtml(r.item_name)}</td><td>${r.amount}</td><td>${escapeHtml(r.reason)}</td></tr>`).join('');
  const taskActions=`<div class="actions"><button class="secondary" onclick="loadTask()">查看任务</button><button class="confirm" onclick="exportTask()">导出 CSV</button></div>`;
  document.getElementById('resultBox').innerHTML=`<div class="grid"><div class="card"><div class="title">汇总</div><div class="meta">任务：${escapeHtml(data.task_id)}</div><div class="meta">机构数：${s.institution_count||0}</div><div class="meta">患者数：${s.patient_count||0}</div><div class="meta">结算人次：${s.settlement_count||0}</div><div class="meta">明细数：${s.detail_count||0}</div><div class="meta">总金额：${s.total_amount||0}</div><div class="meta">基金相关金额：${s.fund_related_amount||0}</div>${taskActions}</div><div class="card"><div class="title">机构排名</div>${orgs||'<div class="empty">暂无</div>'}</div><div class="card"><div class="title">月度趋势</div>${months||'<div class="empty">暂无</div>'}</div><div class="card"><div class="title">执行信息</div><div class="meta">模式：${escapeHtml((data.execution||{}).mode)}</div><div class="meta">SQL 执行：${String((data.execution||{}).sql_executed)}</div><div class="meta">导出：${escapeHtml(((data.export||{}).format)||'csv')}</div></div></div><div class="card" style="margin-top:12px"><div class="title">疑点明细样例</div><div style="overflow:auto"><table><thead><tr><th>序号</th><th>机构</th><th>患者</th><th>项目</th><th>金额</th><th>原因</th></tr></thead><tbody>${rows}</tbody></table></div></div>`;
  renderGraphPanel(data.evidence_graph);
}
async function loadTask(){
  if(!lastTaskId) return; setMessage('正在读取任务详情...');
  try{ const data=await api(`/api/v1/tasks/${encodeURIComponent(lastTaskId)}`); renderResult(data); setMessage('任务详情已刷新。'); }
  catch(err){ setMessage(err.message,true); }
}
function exportTask(){
  if(!lastTaskId) return;
  window.open(`/api/v1/tasks/${encodeURIComponent(lastTaskId)}/export`, '_blank');
}
async function realExecute(){
  if(!lastConfirmPayload) return; const btn=document.getElementById('realBtn'); btn.disabled=true; setMessage('正在调用只读数据库执行...');
  try{ const data=await api('/api/v1/query/execute',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(lastConfirmPayload)}); renderResult(data); setMessage('真实执行完成。结果来自只读数据库连接。'); }
  catch(err){ setMessage(err.message,true); }
  finally{ btn.disabled=false; }
}
async function mockExecute(){
  if(!lastConfirmPayload) return; const btn=document.getElementById('mockBtn'); btn.disabled=true; setMessage('正在生成模拟查询结果...');
  try{ const data=await api('/api/v1/query/mock-execute',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(lastConfirmPayload)}); renderResult(data); setMessage('模拟查询完成。当前使用假数据，不连接真实医保库。'); }
  catch(err){ setMessage(err.message,true); } finally{ btn.disabled=false; }
}

api('/api/v1/stats').then(data=>{ document.getElementById('apiStatus').textContent=`API 在线｜规则 ${data.rule_items}｜政策片段 ${data.policy_chunks}`; }).catch(()=>{ document.getElementById('apiStatus').textContent='API 未连接'; });
</script>
</body>
